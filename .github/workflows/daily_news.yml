name: Daily News Auto Updater

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: 下載專案程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝需要的套件
        run: pip install requests

      - name: 執行新聞抓取腳本
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python fetch_news.py

      - name: 將新資料存檔並推送到網頁
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add news.json
          git commit -m "Auto-update daily news [skip ci]" || exit 0
          git push
