        async function initApp() {
            let allNews = [];
            try {
                // 自動化上線後會抓取這個檔案，加上防快取參數確保抓到最新資料
                const response = await fetch('news.json?v=' + new Date().getTime());
                if (!response.ok) throw new Error('Local file not found');
                allNews = await response.json();
                
                // 檢查是否為舊版資料 (舊版的 enContent 是字串而不是物件)
                // 如果是舊版資料，這裡可以偷偷加上相容處理，但我們主要依賴 openModal 的判斷
            } catch (error) {
                console.log("找不到 news.json 或讀取失敗，載入 8 大洲完整備用資料。");
                allNews = MOCK_DATA;
            }
            renderNews(allNews);
        }

        function renderNews(data) {
            if(data.length === 0) return;
            const todayStr = data[0].date;
            
            const featuredNews = data.filter(n => n.isFeatured);
            const todayNews = data.filter(n => n.date === todayStr && !n.isFeatured);
            const archiveNews = data.filter(n => n.date !== todayStr);

            // 每週精選
            const featuredContainer = document.getElementById('featured-container');
            featuredNews.forEach(news => {
                const el = document.createElement('div');
                el.className = 'featured-card';
                // 加上 onerror 安全防護，避免圖片失效出現破圖
                el.innerHTML = `
                    <img src="${news.imageUrl}" alt="img" class="card-image" onerror="this.src='${FALLBACK_IMAGE}'">
                    <div class="card-content">
                        <span class="badge-featured">🌟 每週精選</span>
                        <div class="tags-wrap">
                            <span class="region-tag">${news.region || '全球'}</span>
                            <span class="category-tag ${news.tagClass}">${news.category}</span>
                        </div>
                        <h2>${news.zhTitle}</h2>
                        <p class="summary" style="-webkit-line-clamp: 3;">${news.zhSummary}</p>
                        <span class="card-date">發布日期: ${news.date}</span>
                    </div>
                `;
                el.addEventListener('click', () => openModal(news));
                featuredContainer.appendChild(el);
            });

            // 今日新聞
            const todayContainer = document.getElementById('today-container');
            todayNews.forEach(news => todayContainer.appendChild(createNormalCard(news)));

            // 歷史新聞
            const archiveContainer = document.getElementById('archive-container');
            const groupedByDate = {};
            archiveNews.forEach(n => {
                if(!groupedByDate[n.date]) groupedByDate[n.date] = [];
                groupedByDate[n.date].push(n);
            });

            Object.keys(groupedByDate).sort((a,b) => b.localeCompare(a)).forEach(date => {
                const dateHeader = document.createElement('div');
                dateHeader.className = 'date-header';
                dateHeader.textContent = `📅 ${date}`;
                archiveContainer.appendChild(dateHeader);

                const grid = document.createElement('div');
                grid.className = 'grid-container';
                groupedByDate[date].forEach(news => grid.appendChild(createNormalCard(news)));
                archiveContainer.appendChild(grid);
            });
        }

        function createNormalCard(news) {
            const el = document.createElement('div');
            el.className = 'news-card';
            // 同樣加上 onerror
            el.innerHTML = `
                <img src="${news.imageUrl}" alt="img" class="card-image" onerror="this.src='${FALLBACK_IMAGE}'">
                <div class="card-content">
                    <div class="tags-wrap">
                        <span class="region-tag">${news.region || '全球'}</span>
                        <span class="category-tag ${news.tagClass}">${news.category}</span>
                    </div>
                    <h2>${news.zhTitle}</h2>
                    <p class="summary">${news.zhSummary}</p>
                    <span class="card-date">${news.date}</span>
                </div>
            `;
            el.addEventListener('click', () => openModal(news));
            return el;
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            document.getElementById(`${tabId}-section`).classList.add('active');
        }

        // 處理彈出視窗
        const modal = document.getElementById('news-modal');
        function openModal(news) {
            currentModalNews = news; 
            
            const modalImg = document.getElementById('modal-img');
            modalImg.src = news.imageUrl;
            modalImg.onerror = function() { this.src = FALLBACK_IMAGE; };

            document.getElementById('modal-region').textContent = news.region || '全球';
            document.getElementById('modal-tag').className = `category-tag ${news.tagClass}`;
            document.getElementById('modal-tag').textContent = news.category;
            document.getElementById('modal-date').textContent = "📅 發布日期：" + news.date;
            
            document.getElementById('modal-zh-title').textContent = news.zhTitle;
            document.getElementById('modal-zh-content').innerHTML = news.zhContent;
            document.getElementById('modal-en-title').textContent = news.enTitle;
            
            const sourceBtn = document.getElementById('modal-source-link');
            document.getElementById('modal-source-name').textContent = news.sourceName;
            sourceBtn.href = news.sourceLink;

            // 相容處理：舊版與新版英文資料的差異
            const levelBox = document.getElementById('level-selector-box');
            const enContentEl = document.getElementById('modal-en-content');
            
            if (news.enContent) {
                if (typeof news.enContent === 'string') {
                    // 如果讀到的是舊版大腦的字串資料
                    levelBox.style.display = 'none';
                    enContentEl.textContent = news.enContent;
                } else {
                    // 如果是新版大腦的物件資料
                    levelBox.style.display = 'flex';
                    setEnglishLevel('basic'); // 預設切換到基礎
                }
            } else {
                enContentEl.textContent = "暫無英文內容";
                levelBox.style.display = 'none';
            }

            // 處理單字卡
            const vocabContainer = document.getElementById('modal-vocab');
            vocabContainer.innerHTML = '';
            if (news.vocabulary && news.vocabulary.length > 0) {
                news.vocabulary.forEach(v => {
                    vocabContainer.innerHTML += `
                        <div class="vocab-card">
                            <span class="vocab-en">${v.word}</span>
                            <span class="vocab-zh">${v.zh}</span>
                        </div>
                    `;
                });
            }

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // 切換英文難度
        function setEnglishLevel(level) {
            if (!currentModalNews || typeof currentModalNews.enContent === 'string') return;
            
            document.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('active'));
            const buttons = document.querySelectorAll('.level-btn');
            if(level === 'basic') buttons[0].classList.add('active');
            if(level === 'intermediate') buttons[1].classList.add('active');
            if(level === 'advanced') buttons[2].classList.add('active');

            const content = currentModalNews.enContent[level];
            document.getElementById('modal-en-content').textContent = content || "無資料";
        }

        document.getElementById('close-modal').addEventListener('click', () => {
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        });

        initApp();
    </script>
