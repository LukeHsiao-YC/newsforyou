        function initApp() {
            renderNews(MOCK_DATA);
        }

        function renderNews(data) {
            const thematicData = data.filter(n => n.type === 'thematic');
            const regionalData = data.filter(n => n.type === 'regional');

            // 渲染四大主題區塊
            const thematicContainer = document.getElementById('thematic-container');
            thematicContainer.innerHTML = '';
            thematicData.forEach(news => {
                const el = document.createElement('div');
                el.className = 'news-card';
                el.innerHTML = `
                    <img src="${news.imageUrl}" alt="img" class="card-image">
                    <div class="card-content">
                        <div class="tags-wrap">
                            <span class="category-tag ${news.tagClass}">${news.category}</span>
                        </div>
                        <h2>${news.zhTitle}</h2>
                        <p class="summary">${news.zhSummary}</p>
                    </div>
                `;
                el.addEventListener('click', () => openModal(news));
                thematicContainer.appendChild(el);
            });

            // 渲染世界地圖的 8 個地標
            const mapContainer = document.getElementById('map-container');
            // 清除舊的地標 (保留 img)
            mapContainer.querySelectorAll('.map-pin').forEach(pin => pin.remove());
            
            regionalData.forEach(news => {
                const coords = regionCoords[news.region];
                if(coords) {
                    const pin = document.createElement('div');
                    pin.className = 'map-pin';
                    pin.style.top = coords.top;
                    pin.style.left = coords.left;
                    pin.innerHTML = `
                        <div class="pin-icon"><i class="fa-solid fa-location-dot">📍</i></div>
                        <div class="pin-label">${news.region}</div>
                    `;
                    pin.addEventListener('click', () => openModal(news));
                    mapContainer.appendChild(pin);
                }
            });
            
            // 歷史庫部分先用區域新聞填滿展示
            const archiveContainer = document.getElementById('archive-container');
            archiveContainer.innerHTML = '<div class="grid-container" id="archive-grid"></div>';
            regionalData.forEach(news => document.getElementById('archive-grid').appendChild(createNormalCard(news)));
        }

        function createNormalCard(news) {
            const el = document.createElement('div');
            el.className = 'news-card';
            el.innerHTML = `
                <img src="${news.imageUrl}" alt="img" class="card-image">
                <div class="card-content">
                    <div class="tags-wrap">
                        <span class="region-tag">${news.region}</span>
                        <span class="category-tag ${news.tagClass}">${news.category}</span>
                    </div>
                    <h2>${news.zhTitle}</h2>
                    <p class="summary">${news.zhSummary}</p>
                </div>
            `;
            el.addEventListener('click', () => openModal(news));
            return el;
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            document.getElementById(`${tabId}-section`).classList.add('active');
        }

        // 彈出視窗
        const modal = document.getElementById('news-modal');
        function openModal(news) {
            currentModalNews = news; 
            
            document.getElementById('modal-img').src = news.imageUrl;
            document.getElementById('modal-region').textContent = news.region;
            document.getElementById('modal-tag').className = `category-tag ${news.tagClass}`;
            document.getElementById('modal-tag').textContent = news.category;
            
            document.getElementById('modal-zh-title').textContent = news.zhTitle;
            document.getElementById('modal-zh-content').innerHTML = news.zhContent;
            
            // 填入鷹架內容
            if(news.scaffold && news.scaffold.length === 3) {
                document.getElementById('scaffold-1').textContent = news.scaffold[0];
                document.getElementById('scaffold-2').textContent = news.scaffold[1];
                document.getElementById('scaffold-3').textContent = news.scaffold[2];
            }

            document.getElementById('modal-en-title').textContent = news.enTitle;
            
            const sourceBtn = document.getElementById('modal-source-link');
            document.getElementById('modal-source-name').textContent = news.sourceName;
            sourceBtn.href = news.sourceLink;

            setEnglishLevel('basic');

            const vocabContainer = document.getElementById('modal-vocab');
            vocabContainer.innerHTML = '';
            if (news.vocabulary) {
                news.vocabulary.forEach(v => {
                    vocabContainer.innerHTML += `<div class="vocab-card"><span class="vocab-en">${v.word}</span><span class="vocab-zh">${v.zh}</span></div>`;
                });
            }

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function setEnglishLevel(level) {
            if (!currentModalNews || !currentModalNews.enContent) return;
            document.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('active'));
            const buttons = document.querySelectorAll('.level-btn');
            if(level === 'basic') buttons[0].classList.add('active');
            if(level === 'intermediate') buttons[1].classList.add('active');
            if(level === 'advanced') buttons[2].classList.add('active');
            document.getElementById('modal-en-content').textContent = currentModalNews.enContent[level];
        }

        document.getElementById('close-modal').addEventListener('click', () => { modal.classList.remove('active'); document.body.style.overflow = 'auto'; });
        modal.addEventListener('click', (e) => { if (e.target === modal) { modal.classList.remove('active'); document.body.style.overflow = 'auto'; } });

        initApp();
    </script>
